<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pánico o Peligro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000008;overflow:hidden}
/* Canvas centrado, tamaño fijo por breakpoint — negro alrededor */
canvas{
  position:fixed;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
}
#pc{z-index:1;pointer-events:none}
#bg{z-index:0}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="pc"></canvas>
<script>
const bg=document.getElementById('bg');
const ctx=bg.getContext('2d');

const TENUE='rgba(255,255,255,.16)';
const BLANCO='rgba(255,255,255,.92)';

const ruido=[
  'Pánico','Peligro','Silencio','Odio','Cambio','Mujer','Espacio',
  'Extranjero','Ruido','Vacío','Grieta','Exilio','Escritura','Recuerdo',
  'Historia','Colonialismo','Máscara','Tortura','Lenguaje','Miedo',
  'Umbral','Cuerpo','Territorio','Violencia','Mapa','Afuera','Gestos',
  'Clase','Traducción','Forma','Tiempo','Plástico','Cerrado','Abierto',
  'Susana','Lourdes','Socorro','Ramiro','Arturo','Lola','González',
  'casa','oficina','calle','ventana','coche','camión','café','cuarto',
  'sala','puerta','cama','espejo','baño','edificio','departamento',
  'integración','flujo','barrio','sueño','silencio','ciudad','miedo',
];

let _seed=42;
function seededRnd(){_seed=(_seed*1664525+1013904223)>>>0;return _seed/4294967296;}
function rnd(){ return ruido[Math.floor(seededRnd()*ruido.length)]; }

// Palabras de ruido: cada una tiene su propio ciclo de vida independiente (fase aleatoria)
// Se asigna al construir el layout
let _ruidoPhases=[];

// Font size adaptado: en mobile más pequeño para que quepan más tokens por fila
// start/end = fracción del flujo donde se insertan los grupos de datos
// En pantallas anchas (landscape/desktop) hay más tokens por fila → grupos más dispersos
// → usar rangos más estrechos para mantenerlos juntos y en la zona media
const BREAKPOINTS=[
  {name:'mobile-v',  w:390,  h:844,  fs:11},
  {name:'mobile-h',  w:844,  h:390,  fs:11},
  {name:'tablet-v',  w:768,  h:1024, fs:14},
  {name:'tablet-h',  w:1024, h:768,  fs:14},
  {name:'macbook',   w:1280, h:800,  fs:22},
  {name:'laptop',    w:1440, h:900,  fs:24},
  {name:'desktop',   w:1920, h:1080, fs:28},
];

function getBreakpoint(){
  const vw=window.innerWidth, vh=window.innerHeight;
  // elige el breakpoint cuya relación aspecto y tamaño más se acerca a la ventana
  return BREAKPOINTS.reduce((best,bp)=>{
    const dw=Math.abs(bp.w-vw), dh=Math.abs(bp.h-vh);
    const db=Math.abs(best.w-vw)+Math.abs(best.h-vh);
    return (dw+dh)<db ? bp : best;
  });
}

function getFS(){ return getBreakpoint().fs; }
function getCanvasW(){ return getBreakpoint().w; }
function getCanvasH(){ return getBreakpoint().h; }
// Grupos de datos — pos se calcula dinámicamente en buildLayout()
// group: id del grupo (0-7), mismo grupo = misma hilera garantizada
const eventosDef=[
  // grupo 0: título
  {t:'Pánico.',    delay: 500,  grupo:0, color:BLANCO},
  {t:'Peligro.',   delay: 900,  grupo:0, color:BLANCO},
  // grupo 1: autora
  {t:'María.',     delay:1600,  grupo:1, color:BLANCO},
  {t:'Luisa.',     delay:1900,  grupo:1, color:BLANCO},
  {t:'Puga.',      delay:2200,  grupo:1, color:BLANCO},
  // grupo 2: lugar
  {t:'Centro.',    delay:2800,  grupo:2, color:BLANCO},
  {t:'Cultural.',  delay:3100,  grupo:2, color:BLANCO},
  {t:'España.',    delay:3400,  grupo:2, color:BLANCO},
  // grupo 3: fecha
  {t:'25.06.2026.',delay:4000,  grupo:3, color:BLANCO},
  // grupo 4: artistas
  {t:'Daniela.',   delay:4700,  grupo:4, color:BLANCO, hoverable:true},
  {t:'Reséndiz.',  delay:4950,  grupo:4, color:BLANCO, hoverable:true},
  {t:'—',          delay:5150,  grupo:4, color:BLANCO},
  {t:'Brenda.',    delay:5350,  grupo:4, color:BLANCO, hoverable:true},
  {t:'Isabel.',    delay:5550,  grupo:4, color:BLANCO, hoverable:true},
  {t:'Pérez.',     delay:5750,  grupo:4, color:BLANCO, hoverable:true},
  // grupo 5: link cartografía (centrado)
  {t:'cartografía.',delay:6400, grupo:5, color:'#ffee00', href:'cartografia.html', hoverable:true, mono:true, center:true},
  // grupo 6: link redes (centrado)
  {t:'redes.',     delay:6800,  grupo:6, color:'#ffee00', href:'grafos.html', hoverable:true, mono:true, center:true},
];
const NUM_GRUPOS=7;

let _layout=null;
let _W=0,_H=0;

function buildLayout(){
  const W=getCanvasW(), H=getCanvasH();
  _W=W; _H=H;
  _seed=42;
  const FS=getFS();
  const lh=Math.round(FS*1.52);
  ctx.font=`italic ${FS}px Georgia,serif`;

  // Margen interior: los tokens de evento solo se colocan si caben dentro del carril
  const MARGEN=Math.round(W*0.20);
  const carriW=W-MARGEN*2;

  function rowX(row){ return -(row*71)%Math.min(140,W*0.15); }

  // Agrupar eventos por grupo id
  const gruposMap=new Map();
  eventosDef.forEach(e=>{
    if(!gruposMap.has(e.grupo)) gruposMap.set(e.grupo,[]);
    gruposMap.get(e.grupo).push(e);
  });
  const gruposArr=[...gruposMap.entries()].sort((a,b)=>a[0]-b[0]);

  // Distribuir grupos en el flujo: pos relativa al total de tokens
  const totalRows=Math.ceil(H/lh)+2;
  const avgTW=FS*4.8;
  const tokPerRow=Math.ceil(W/avgTW)+2;
  const totalToks=totalRows*tokPerRow;
  const bp=getBreakpoint();
  const isWide=bp.w>=1280;
  const startPos=isWide?0.28:0.25;
  const endPos=isWide?0.52:0.58;
  const step=(endPos-startPos)/(gruposArr.length-1);
  const grupos=gruposArr.map(([gid,items],gi)=>({
    items, pos:startPos+gi*step
  }));

  // Construir el flujo: ruido de borde a borde + eventos insertados en el carril
  const layout=[];
  _ruidoPhases=[];
  let gi=0;
  let r=0, x=rowX(0);

  function pushRuido(){
    const t=rnd()+'.  ';
    const tw=ctx.measureText(t).width;
    if(x+tw>W+20){ r++; x=rowX(r); }
    const y=r*lh+FS;
    layout.push({t, isRuido:true, x, y, tw, fs:FS, phaseIdx:_ruidoPhases.length});
    _ruidoPhases.push({phase:seededRnd(), period:3000+seededRnd()*5000});
    x+=tw;
  }

  function flushGrupo(){
    const {items}=grupos[gi]; gi++;
    function measureE(e){
      const prev=ctx.font;
      if(e.mono) ctx.font=`${FS}px Consolas,"Lucida Console",monospace`;
      const w=ctx.measureText(e.t+'  ').width;
      ctx.font=prev;
      return w;
    }
    const totalW=items.reduce((s,e)=>s+measureE(e),0);
    const enCarril=(x>=MARGEN && x+totalW<=MARGEN+carriW);
    if(!enCarril){
      let safety=0;
      while((x<MARGEN || x+totalW>MARGEN+carriW) && safety<tokPerRow*3){
        pushRuido(); safety++;
      }
    }
    items.forEach(e=>{
      const tw=measureE(e);
      if(x+tw>W+20){ r++; x=rowX(r); }
      const y=r*lh+FS;
      layout.push({t:e.t+'  ', isEvento:true, eref:e, x, y, tw, fs:FS});
      x+=tw;
    });
  }

  for(let i=0;i<totalToks;i++){
    const pos=i/totalToks;
    while(gi<grupos.length && pos>=grupos[gi].pos) flushGrupo();
    pushRuido();
  }
  while(gi<grupos.length) flushGrupo();

  _layout=layout;
  window._clickables=[];
}

let _hoverHref=null;
let _hoverTok=null;

const startTime=performance.now();

function drawFrame(now){
  const elapsed=now-startTime;

  const CW=getCanvasW(), CH=getCanvasH();
  if(!_layout || CW!==_W || CH!==_H){
    bg.width=CW; bg.height=CH;
    bg.style.width=CW+'px'; bg.style.height=CH+'px';
    pc.width=CW; pc.height=CH;
    pc.style.width=CW+'px'; pc.style.height=CH+'px';
    buildLayout();
  }

  const FS=getFS();
  ctx.clearRect(0,0,_W,_H);
  ctx.shadowBlur=0;
  window._clickables=[];

  _layout.forEach(tok=>{
    if(tok.y>_H+20) return;
    const tFS=tok.fs||FS;

    if(tok.isEvento){
      const e=tok.eref;
      const t=elapsed-e.delay;
      if(t<0) return;
      const op=Math.min(1,t/500);

      if(op>0.1 && e.hoverable) window._clickables.push({
        x1:tok.x, y1:tok.y-tFS*1.5, x2:tok.x+tok.tw+20, y2:tok.y+6,
        href:e.href||null, eref:e
      });

      // hover solo en links (cartografía y redes)
      const isHover=e.href && _hoverTok===tok;
      const fs=isHover ? tFS*1.5 : tFS;
      const fontStr=e.mono
        ? `${fs}px Consolas,"Lucida Console",monospace`
        : `italic ${fs}px Georgia,serif`;
      ctx.font=fontStr;

      // centrar el hover: desplazar x para que el centro del token no se mueva
      let drawX=tok.x;
      if(isHover){
        const twNormal=tok.tw;
        const twHover=ctx.measureText(tok.t).width;
        drawX=tok.x-(twHover-twNormal)/2;
      }

      if(e.color==='#ffee00'){
        ctx.fillStyle=`rgba(255,238,0,${op})`;
      } else if(e.href){
        ctx.fillStyle=`rgba(0,0,255,${op})`;
      } else {
        ctx.fillStyle=`rgba(255,255,255,${op*0.92})`;
      }
      ctx.fillText(tok.t, drawX, tok.y);
      ctx.font=`italic ${tFS}px Georgia,serif`;

    } else if(tok.isRuido){
      const ph=_ruidoPhases[tok.phaseIdx];
      const cycle=(elapsed/ph.period + ph.phase) % 1;
      let op;
      if(cycle<0.4) op=cycle/0.4;
      else if(cycle<0.6) op=1;
      else op=(1-cycle)/0.4;
      ctx.font=`italic ${tFS}px Georgia,serif`;
      ctx.fillStyle=`rgba(255,255,255,${op*0.16})`;
      ctx.fillText(tok.t,tok.x,tok.y);
    }
  });

  requestAnimationFrame(drawFrame);
}

function hitTest(mx,my){
  return (window._clickables||[]).find(c=>mx>=c.x1&&mx<=c.x2&&my>=c.y1&&my<=c.y2);
}
bg.addEventListener('mousemove',e=>{
  const b=bg.getBoundingClientRect();
  const hit=hitTest(e.clientX-b.left,e.clientY-b.top);
  bg.style.cursor=(hit&&hit.href)?'pointer':'default';
  _hoverHref=hit?hit.href:null;
  _hoverTok=hit?hit.eref?_layout.find(t=>t.eref===hit.eref):null:null;
});
bg.addEventListener('click',e=>{
  const b=bg.getBoundingClientRect();
  const hit=hitTest(e.clientX-b.left,e.clientY-b.top);
  if(hit&&hit.href) window.location.href=hit.href;
});
// touch: tap en links
bg.addEventListener('touchend',e=>{
  const b=bg.getBoundingClientRect();
  const t=e.changedTouches[0];
  const hit=hitTest(t.clientX-b.left,t.clientY-b.top);
  if(hit&&hit.href){e.preventDefault();window.location.href=hit.href;}
},{passive:false});

requestAnimationFrame(drawFrame);

// Partículas
const pc=document.getElementById('pc');
const px=pc.getContext('2d');
// canvas se inicializa en drawFrame
const pts=Array.from({length:35},()=>({
  x:Math.random()*pc.width,y:Math.random()*pc.height,
  s:Math.random()*.5+.1,vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.15,
  life:Math.random(),ml:Math.random()*.006+.002,
  c:Math.random()>.5?'rgba(255,255,255,':'rgba(0,0,200,'
}));
(function anim(){
  px.clearRect(0,0,pc.width,pc.height);
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life+=p.ml;
    const op=p.life<.5?p.life*2:(1-p.life)*2;
    if(p.life>=1){p.life=0;p.x=Math.random()*pc.width;p.y=Math.random()*pc.height;}
    px.beginPath();px.arc(p.x,p.y,p.s,0,Math.PI*2);
    px.fillStyle=p.c+(op*.14)+')';px.fill();
  });
  requestAnimationFrame(anim);
})();
</script>
</body>
</html>
